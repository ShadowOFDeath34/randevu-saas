name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/randevu"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/randevu"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "ci-test-secret-key-at-least-32-chars-long-for-testing"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      IYZIPAY_API_KEY: "sandbox-api-key"
      IYZIPAY_SECRET_KEY: "sandbox-secret-key"
      IYZIPAY_BASE_URL: "https://sandbox-api.iyzico.com"
      RESEND_API_KEY: "re_placeholder_for_ci"
      EMAIL_FROM: "test@example.com"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci
        continue-on-error: true
